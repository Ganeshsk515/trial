name: Node.js CI

on:
  pull_request:
    branches: [ develop ]  # This triggers the "guard" only on PRs to develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # This tells GitHub to spin up a temporary Linux server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Downloads your code onto the GitHub server

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches your team's Node version

      - name: Install dependencies
        run: npm ci  # A "clean install" specifically for CI environments

      - name: Run Linting
        run: npm run lint  # Checks for code style errors

      - name: Run Tests
        run: npm test      # Runs your unit tests