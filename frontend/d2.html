<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAIMS — Smart Assignment & Internship Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Warm white professional palette */
  --bg:        #faf9f7;
  --bg2:       #f5f3ef;
  --bg3:       #edeae4;
  --surface:   #ffffff;
  --surface2:  #f9f8f6;
  --border:    #e8e4dc;
  --border2:   #d5cfc4;

  /* Typography */
  --text:      #1a1714;
  --text2:     #6b6459;
  --text3:     #a8a098;

  /* Brand — deep indigo + warm amber accent */
  --accent:    #2d3a8c;
  --accent-lt: #eef0fa;
  --accent2:   #1e2866;
  --amber:     #c47a1e;
  --amber-lt:  #fdf3e3;
  --teal:      #1a7a6e;
  --teal-lt:   #e8f6f4;
  --rose:      #b5363a;
  --rose-lt:   #fceaea;
  --sage:      #3a6b4a;
  --sage-lt:   #eaf3ec;

  --sidebar-w: 252px;
  --sidebar-c:  68px;
  --nav-h:      60px;
  --r:          10px;
  --r-sm:        6px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:     0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:  0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh }
h1,h2,h3,h4 { font-family:'Playfair Display',serif }
#app { min-height:100vh }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px }

/* Animations */
@keyframes fadeUp    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin      { to{transform:rotate(360deg)} }
@keyframes shimmer   { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
@keyframes toastIn   { from{opacity:0;transform:translateX(80px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse2    { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes fill      { from{width:0} to{width:var(--w)} }

/* ── TYPOGRAPHY ─────────────────────────────────── */
.display { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; line-height:1.2 }
.headline { font-size:22px; font-weight:600 }
.title   { font-size:16px; font-weight:600 }
.label   { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text3) }
.caption { font-size:12px; color:var(--text2) }

/* ── BUTTONS ─────────────────────────────────────── */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border-radius:var(--r-sm); font-family:'Outfit',sans-serif; font-weight:600; font-size:13px; cursor:pointer; transition:all .18s; border:none; text-decoration:none; white-space:nowrap; letter-spacing:.01em }
.btn-primary { background:var(--accent); color:#fff; box-shadow:0 2px 6px rgba(45,58,140,.25) }
.btn-primary:hover { background:var(--accent2); box-shadow:0 4px 12px rgba(45,58,140,.32); transform:translateY(-1px) }
.btn-primary:active { transform:translateY(0) }
.btn-amber  { background:var(--amber); color:#fff; box-shadow:0 2px 6px rgba(196,122,30,.25) }
.btn-amber:hover { background:#b06c15; transform:translateY(-1px) }
.btn-outline { background:var(--surface); color:var(--text); border:1.5px solid var(--border2) }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt) }
.btn-ghost  { background:transparent; color:var(--text2); border:none }
.btn-ghost:hover { color:var(--accent); background:var(--accent-lt) }
.btn-danger { background:var(--rose-lt); color:var(--rose); border:1.5px solid rgba(181,54,58,.2) }
.btn-danger:hover { background:rgba(181,54,58,.12) }
.btn-sm  { padding:6px 13px; font-size:12px }
.btn-lg  { padding:12px 26px; font-size:15px; border-radius:8px }
.btn-full { width:100% }
.btn-icon { padding:8px; border-radius:var(--r-sm) }

/* ── INPUT ───────────────────────────────────────── */
.input { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:10px 13px; color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; outline:none; transition:all .18s }
.input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(45,58,140,.08) }
.input::placeholder { color:var(--text3) }
textarea.input { resize:vertical; min-height:100px }
select.input option { background:var(--surface) }
.input-wrap { margin-bottom:18px }
.input-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px }

/* ── CARD ────────────────────────────────────────── */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:22px; box-shadow:var(--shadow-sm) }
.card:hover { box-shadow:var(--shadow) }
.card-flat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:18px }

/* ── BADGE ───────────────────────────────────────── */
.badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.03em }
.b-indigo { background:var(--accent-lt); color:var(--accent) }
.b-amber  { background:var(--amber-lt);  color:var(--amber) }
.b-teal   { background:var(--teal-lt);   color:var(--teal) }
.b-rose   { background:var(--rose-lt);   color:var(--rose) }
.b-sage   { background:var(--sage-lt);   color:var(--sage) }
.b-gray   { background:var(--bg3); color:var(--text2) }
.b-dot::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; display:inline-block }

/* ── DIVIDER ─────────────────────────────────────── */
.divider { height:1px; background:var(--border); margin:20px 0 }
.divider-v { width:1px; background:var(--border); align-self:stretch }

/* ── AUTH ────────────────────────────────────────── */
.auth-wrap { min-height:100vh; display:flex; background:var(--bg) }
.auth-left  { flex:1; display:flex; align-items:center; justify-content:center; padding:40px; position:relative }
.auth-right { width:520px; background:var(--surface); border-left:1px solid var(--border); display:flex; align-items:center; justify-content:center; padding:48px; flex-direction:column }
.auth-brand { display:flex; align-items:center; gap:10px; margin-bottom:48px }
.auth-brand-mark { width:38px; height:38px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; box-shadow:0 4px 12px rgba(45,58,140,.3) }
.auth-brand-name { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--text) }
.auth-card { width:100%; max-width:400px }
.auth-headline { font-size:28px; font-weight:700; margin-bottom:6px; font-family:'Playfair Display',serif }
.auth-sub { font-size:14px; color:var(--text2); margin-bottom:32px }
.auth-hero { text-align:center }
.auth-hero-graphic { width:340px; height:320px; margin:0 auto 32px; position:relative; display:flex; align-items:center; justify-content:center }
.hero-ring { position:absolute; border-radius:50%; border:1px solid var(--border) }
.hero-float { position:absolute; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; box-shadow:var(--shadow); font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; animation:fadeUp .6s ease both; white-space:nowrap }
.role-pills { display:flex; gap:8px; margin-bottom:26px }
.role-pill { flex:1; background:var(--bg2); border:1.5px solid var(--border); border-radius:8px; padding:12px 8px; cursor:pointer; transition:all .18s; text-align:center }
.role-pill:hover { border-color:var(--accent); background:var(--accent-lt) }
.role-pill.active { border-color:var(--accent); background:var(--accent-lt); box-shadow:0 0 0 3px rgba(45,58,140,.1) }
.role-pill-icon { font-size:20px; margin-bottom:5px }
.role-pill-label { font-size:11px; font-weight:600; color:var(--text2) }
.role-pill.active .role-pill-label { color:var(--accent) }
.show-hide { position:absolute; right:12px; top:50%; transform:translateY(-50%) translateY(11px); font-size:15px; cursor:pointer; color:var(--text3); padding:4px }
.show-hide:hover { color:var(--text2) }
.auth-footer { font-size:13px; color:var(--text2); text-align:center; margin-top:22px }
.link { color:var(--accent); text-decoration:none; font-weight:600; cursor:pointer }
.link:hover { color:var(--accent2); text-decoration:underline }

/* ── SIDEBAR ─────────────────────────────────────── */
.layout { display:flex; min-height:100vh }
.sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; transition:width .28s cubic-bezier(.4,0,.2,1); overflow:hidden; box-shadow:1px 0 0 var(--border) }
.sidebar.collapsed { width:var(--sidebar-c) }
.sidebar-head { padding:16px 16px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); min-height:var(--nav-h) }
.s-logo { width:30px; height:30px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; color:#fff }
.s-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:var(--text); white-space:nowrap }
.s-toggle { margin-left:auto; width:26px; height:26px; border-radius:6px; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--text2); flex-shrink:0; transition:all .18s }
.s-toggle:hover { background:var(--accent-lt); color:var(--accent) }
.sidebar-body { flex:1; overflow-y:auto; padding:10px 0 }
.nav-group { margin-bottom:2px }
.nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--text3); padding:14px 20px 6px; white-space:nowrap }
.collapsed .nav-label { display:none }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer; transition:all .16s; color:var(--text2); font-size:13.5px; font-weight:500; border-radius:7px; margin:0 8px; position:relative; white-space:nowrap }
.nav-item:hover { color:var(--text); background:var(--bg2) }
.nav-item.active { color:var(--accent); background:var(--accent-lt); font-weight:600 }
.nav-item.active::before { content:''; position:absolute; left:-8px; top:20%; height:60%; width:3px; background:var(--accent); border-radius:0 3px 3px 0 }
.nav-ic { font-size:17px; flex-shrink:0; width:22px; display:flex; align-items:center; justify-content:center }
.nav-txt { flex:1 }
.nav-badge { background:var(--amber); color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px }
.sidebar-foot { padding:12px 16px; border-top:1px solid var(--border) }
.user-tile { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; cursor:pointer; transition:all .18s }
.user-tile:hover { background:var(--bg2) }
.avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; color:#fff }
.user-nm { font-size:13px; font-weight:600; white-space:nowrap }
.user-rl { font-size:11px; color:var(--text2) }

/* ── TOPBAR ──────────────────────────────────────── */
.topbar { position:fixed; top:0; right:0; left:var(--sidebar-w); height:var(--nav-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:14px; z-index:99; transition:left .28s cubic-bezier(.4,0,.2,1) }
.topbar.col { left:var(--sidebar-c) }
.tb-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--text) }
.tb-spacer { flex:1 }
.search-wrap { display:flex; align-items:center; gap:7px; background:var(--bg2); border:1px solid var(--border); border-radius:7px; padding:7px 12px; min-width:210px; transition:all .18s }
.search-wrap:focus-within { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(45,58,140,.08) }
.search-wrap input { background:none; border:none; outline:none; color:var(--text); font-family:'Outfit',sans-serif; font-size:13px; flex:1 }
.search-wrap input::placeholder { color:var(--text3) }
.icon-btn { position:relative; width:36px; height:36px; border-radius:7px; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:17px; color:var(--text2); transition:all .18s }
.icon-btn:hover { background:var(--accent-lt); color:var(--accent); border-color:rgba(45,58,140,.2) }
.notif-dot { position:absolute; top:7px; right:7px; width:7px; height:7px; border-radius:50%; background:var(--rose); border:1.5px solid var(--surface); animation:pulse2 2s ease infinite }

/* ── MAIN ────────────────────────────────────────── */
.main { margin-left:var(--sidebar-w); margin-top:var(--nav-h); padding:28px; min-height:calc(100vh - var(--nav-h)); transition:margin-left .28s cubic-bezier(.4,0,.2,1); background:var(--bg) }
.main.col { margin-left:var(--sidebar-c) }
.page-in { animation:fadeUp .4s ease both }

/* ── STAT CARDS ──────────────────────────────────── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:26px }
.stat-card  { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:20px; animation:fadeUp .5s ease both; transition:all .22s; position:relative; overflow:hidden }
.stat-card:hover { box-shadow:var(--shadow); transform:translateY(-2px) }
.stat-accent { position:absolute; top:0; right:0; width:64px; height:64px; border-radius:0 var(--r) 0 64px; opacity:.07 }
.stat-icon { font-size:22px; margin-bottom:12px }
.stat-val  { font-family:'Playfair Display',serif; font-size:34px; font-weight:700; line-height:1; margin-bottom:4px }
.stat-lbl  { font-size:13px; color:var(--text2); font-weight:500 }
.stat-chg  { font-size:11px; font-weight:600; margin-top:8px; display:flex; align-items:center; gap:4px }
.chg-up   { color:var(--teal) }
.chg-dn   { color:var(--rose) }

/* ── GRIDS ───────────────────────────────────────── */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:20px }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px }
.span2 { grid-column:span 2 }

/* ── SECTION ─────────────────────────────────────── */
.sec { margin-bottom:28px; animation:fadeUp .45s ease both }
.sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px }
.sec-title { font-size:15px; font-weight:700; color:var(--text) }

/* ── TABLE ───────────────────────────────────────── */
.tbl-wrap { overflow-x:auto; border-radius:var(--r); border:1px solid var(--border); background:var(--surface) }
table { width:100%; border-collapse:collapse }
thead { background:var(--bg2) }
th { padding:11px 16px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text2); border-bottom:1px solid var(--border) }
td { padding:12px 16px; font-size:13.5px; border-bottom:1px solid var(--border) }
tr:last-child td { border-bottom:none }
tr:hover td { background:var(--bg2) }
.td-main { font-weight:600; color:var(--text) }

/* ── PROGRESS ────────────────────────────────────── */
.prog-row { margin-bottom:14px }
.prog-meta { display:flex; justify-content:space-between; font-size:12.5px; color:var(--text2); margin-bottom:6px }
.prog-meta strong { color:var(--text) }
.prog-bar { height:5px; background:var(--bg3); border-radius:10px; overflow:hidden }
.prog-fill { height:100%; border-radius:10px; background:var(--accent); transition:width 1.2s cubic-bezier(.4,0,.2,1) }
.prog-fill.am { background:var(--amber) }
.prog-fill.tl { background:var(--teal) }
.prog-fill.ro { background:var(--rose) }

/* ── CHARTS ──────────────────────────────────────── */
.chart-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:22px }
.chart-lbl { font-size:14px; font-weight:700; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center }
.bar-area  { display:flex; align-items:flex-end; gap:6px; height:150px; padding-top:10px }
.bar-col   { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1 }
.bar       { width:100%; border-radius:5px 5px 0 0; min-height:4px; transition:height .9s cubic-bezier(.4,0,.2,1); cursor:pointer; position:relative }
.bar:hover::after { content:attr(data-v); position:absolute; top:-22px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; white-space:nowrap }
.bar-lbl { font-size:10px; color:var(--text3); text-align:center }

/* ── ASSIGNMENTS ─────────────────────────────────── */
.asn-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px }
.asn-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; cursor:pointer; transition:all .22s; animation:fadeUp .4s ease both }
.asn-card:hover { box-shadow:var(--shadow); border-color:var(--border2); transform:translateY(-2px) }
.asn-top  { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px }
.asn-title { font-size:14px; font-weight:700; margin-bottom:3px; line-height:1.4 }
.asn-course { font-size:11px; color:var(--text2); font-weight:500 }
.asn-meta { display:flex; gap:14px; font-size:12px; color:var(--text2); margin-top:12px }
.asn-foot { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:12px; border-top:1px solid var(--border) }

/* ── FILTERS ─────────────────────────────────────── */
.filter-row { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap }
.f-chip { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; transition:all .18s; background:var(--surface); border:1.5px solid var(--border); color:var(--text2) }
.f-chip:hover,.f-chip.on { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(45,58,140,.25) }

/* ── UPLOAD ──────────────────────────────────────── */
.drop-zone { border:2px dashed var(--border2); border-radius:var(--r); padding:36px; text-align:center; cursor:pointer; transition:all .18s }
.drop-zone:hover,.drop-zone.drag { border-color:var(--accent); background:var(--accent-lt) }
.drop-icon { font-size:36px; margin-bottom:10px; opacity:.5 }
.drop-txt  { font-size:14px; font-weight:600; margin-bottom:5px }
.drop-sub  { font-size:12px; color:var(--text2) }

/* ── TOGGLE ──────────────────────────────────────── */
.tgl-wrap { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border) }
.tgl-wrap:last-child { border-bottom:none }
.tgl { width:40px; height:22px; border-radius:11px; background:var(--bg3); border:1px solid var(--border2); cursor:pointer; position:relative; transition:all .2s; flex-shrink:0 }
.tgl.on { background:var(--accent); border-color:var(--accent) }
.tgl::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; top:2px; left:2px; transition:all .2s; box-shadow:0 1px 3px rgba(0,0,0,.2) }
.tgl.on::after { left:20px }
.tgl-info .tgl-lbl { font-size:13.5px; font-weight:600 }
.tgl-info .tgl-sub { font-size:11.5px; color:var(--text2) }

/* ── GRADING ─────────────────────────────────────── */
.grade-big { font-family:'Playfair Display',serif; font-size:52px; font-weight:700; text-align:center; line-height:1 }
.rubric-row { display:flex; align-items:center; gap:14px; padding:11px 0; border-bottom:1px solid var(--border) }
.rubric-row:last-child { border-bottom:none }
.r-label { font-size:13.5px; font-weight:500; flex:1 }
.r-max   { font-size:11px; color:var(--text2) }
.r-input { width:60px; text-align:center; font-size:15px; font-weight:700; background:var(--bg2); border:1.5px solid var(--border); border-radius:6px; padding:6px; color:var(--text); outline:none; font-family:'Playfair Display',serif; transition:all .18s }
.r-input:focus { border-color:var(--accent) }

/* ── TIMELINE ────────────────────────────────────── */
.tl { position:relative; padding-left:28px }
.tl::before { content:''; position:absolute; left:9px; top:6px; bottom:6px; width:1.5px; background:var(--border) }
.tl-item { position:relative; margin-bottom:22px }
.tl-item::before { content:''; position:absolute; left:-23px; top:5px; width:10px; height:10px; border-radius:50%; background:var(--accent); border:2px solid var(--surface); box-shadow:0 0 0 3px rgba(45,58,140,.15) }
.tl-date { font-size:10.5px; color:var(--text3); margin-bottom:5px; font-weight:700; text-transform:uppercase; letter-spacing:.07em }

.steps { display:flex; align-items:center; margin-bottom:28px }

.step-n { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; transition:all .3s }
.step-n.done   { background:var(--teal); color:#fff }

/* ── TAGS ────────────────────────────────────────── */

.tag.on,.tag:hover { background:var(--accent-lt); border-color:rgba(45,58,140,.3); color:var(--accent) }

/* ── TOAST ───────────────────────────────────────── */
.toast-stack { position:fixed; top:18px; right:18px; z-index:9999; display:flex; flex-direction:column; gap:8px }
.toast { display:flex; align-items:center; gap:10px; padding:13px 16px; border-radius:9px; min-width:280px; max-width:360px; font-size:13.5px; background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-lg); animation:toastIn .28s ease both; font-weight:500 }

/* ── NOTIF PANEL ─────────────────────────────────── */
.notif-panel { position:absolute; top:calc(100% + 7px); right:0; width:330px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow-lg); z-index:200; animation:slideDown .18s ease; overflow:hidden }

/* ── FAB ─────────────────────────────────────────── */
.fab { position:fixed; bottom:26px; right:26px; width:50px; height:50px; border-radius:50%; background:var(--accent); color:#fff; font-size:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(45,58,140,.35); border:none; z-index:98; transition:all .2s }

/* ── PAGINATION ──────────────────────────────────── */

.pg:hover,.pg.on { background:var(--accent); border-color:var(--accent); color:#fff }

/* ── HEALTH ──────────────────────────────────────── */

        ${[['Date Range','Last 30 days,Last 3 months,This semester'],['Course','All Courses,Data Structures,Web Development,ML'],['Type','Submission Rates,Grade Distribution,Intern Progress']].map(([l,opts])=>`

      </div>
    </div>
    <div class="g2">
      <div class="chart-box">
        <div class="chart-lbl"><span>📊 Grade Distribution</span></div>
        <div class="bar-area" style="height:140px">
          ${[['A (90+)',28,'var(--teal)'],['B (80-89)',45,'var(--accent)'],['C (70-79)',35,'var(--amber)'],['D (60-69)',18,'var(--rose)'],['F (<60)',8,'#ccc']].map(([r,v,c])=>`
            <div class="bar-col">
              <div class="bar" data-v="${v}" style="height:${Math.round(v/45*100)}%;background:${c}"></div>
              <span class="bar-lbl" style="font-size:9px;text-align:center">${r}</span>

      </div>
      <div class="chart-box">
        <div class="chart-lbl"><span>📈 Daily Submissions (this week)</span></div>
        <div class="bar-area" style="height:140px">
          ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>{const v=[12,28,18,42,35,8,5][i];return `
            <div class="bar-col">
              <div class="bar" data-v="${v}" style="height:${Math.round(v/42*100)}%;background:${i===3?'var(--amber)':'var(--bg3)'}"></div>

    <div class="sec" style="margin-top:20px">
      <div class="sec-head"><div class="sec-title">Course Performance Summary</div></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Course</th><th>Assignments</th><th>Avg Submissions</th><th>Avg Grade</th><th>Completion</th></tr></thead>
          <tbody>
            ${[
              {c:'Data Structures',a:4,s:'28/32',g:'82.4',r:87.5},
              {c:'Web Development',a:5,s:'30/32',g:'79.8',r:93.7},
              {c:'Machine Learning',a:3,s:'25/32',g:'85.1',r:78.1},
              {c:'Database Systems',a:4,s:'22/32',g:'77.3',r:68.7},
            ].map(r=>`
              <tr>
                <td class="td-main">${r.c}</td>
                <td>${r.a}</td>
                <td>${r.s}</td>
                <td><span style="font-weight:700;color:${parseFloat(r.g)>=80?'var(--teal)':'var(--amber)'}">${r.g}</span></td>
                <td>
                  <div style="display:flex;align-items:center;gap:7px">
                    <div style="flex:1;height:4px;background:var(--bg3);border-radius:4px;min-width:55px">

}

/* ─── ROUTER ─────────────────────────────────────── */
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  const map={
    login:renderLogin, register:renderRegister, forgot:renderForgot,
    'student-home':renderStudentHome, 'student-asn':renderStudentAsn,
    submission:renderSubmission, 'student-intern':renderStudentIntern,
    'teacher-home':renderTeacherHome, 'teacher-asn':renderTeacherAsn,
    'create-asn':renderCreateAsn, grading:renderGrading,
    'teacher-intern':renderTeacherIntern,
    'admin-home':renderAdminHome, 'admin-users':renderAdminUsers,
    reports:renderReports,
  };
  app.innerHTML=(map[S.page]||renderLogin)();
}

document.addEventListener('click',e=>{
  if(S.notifOpen||S.profileOpen){
    if(!e.target.closest('.notif-panel')&&!e.target.closest('.icon-btn')&&!e.target.closest('.dd-menu')&&!e.target.closest('.avatar')){
      S.notifOpen=false; S.profileOpen=false; render();
    }
  }
});

render();
</script>
